<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Be My Valentine 💖</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ff4e8a, #ff9a9e);
    overflow: hidden;
    text-align: center;
    padding: 20px;
}

.container {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(15px);
    padding: 40px 25px;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    color: white;
    width: 100%;
    max-width: 500px;
    position: relative;
}

h1 {
    font-size: clamp(1.5rem, 5vw, 2.5rem);
    margin-bottom: 40px;
}

.buttons {
    position: relative;
    width: 100%;
    height: 150px;
}

button {
    padding: 12px 30px;
    border: none;
    border-radius: 50px;
    font-size: 1rem;
    cursor: pointer;
    transition: 0.3s ease;
    position: absolute;
}

#yesBtn {
    background: #ff006e;
    color: white;
    left: 20%;
}

#yesBtn:hover {
    transform: scale(1.1);
}

#noBtn {
    background: white;
    color: #ff006e;
    left: 55%;
}

.message {
    font-size: clamp(1.3rem, 5vw, 2rem);
    margin-top: 20px;
    display: none;
    animation: pop 0.6s ease forwards;
}

@keyframes pop {
    from {transform: scale(0);}
    to {transform: scale(1);}
}

/* Floating hearts */
.heart {
    position: absolute;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% {transform: translateY(100vh) scale(0);}
    100% {transform: translateY(-10vh) scale(1);}
}
</style>
</head>
<body>

<div class="container">
    <h1>Will you be my Valentine? 💘</h1>

    <div class="buttons" id="buttonArea">
        <button id="yesBtn">Yes 💖</button>
        <button id="noBtn">No 😢</button>
    </div>

    <div class="message" id="loveMessage">
        I knew it! 💕 <br> I Love you Soo Much 💘
    </div>
</div>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const message = document.getElementById("loveMessage");
const buttonArea = document.getElementById("buttonArea");

// Function to move No button randomly inside container
function moveNoButton() {
    const areaWidth = buttonArea.clientWidth - noBtn.offsetWidth;
    const areaHeight = buttonArea.clientHeight - noBtn.offsetHeight;

    const randomX = Math.random() * areaWidth;
    const randomY = Math.random() * areaHeight;

    noBtn.style.left = randomX + "px";
    noBtn.style.top = randomY + "px";
}

// Desktop hover
noBtn.addEventListener("mouseenter", moveNoButton);

// Mobile touch
noBtn.addEventListener("touchstart", function(e) {
    e.preventDefault();
    moveNoButton();
});

// Yes button click
yesBtn.addEventListener("click", function() {
    message.style.display = "block";
    yesBtn.style.display = "none";
    noBtn.style.display = "none";
});

// Floating hearts
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 20 + 15 + "px";
    heart.style.animationDuration = Math.random() * 3 + 3 + "s";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}

setInterval(createHeart, 400);
</script>

</body>
</html>
